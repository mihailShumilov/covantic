# Full development stack for Covantic
# Usage: docker compose -f docker/docker-compose.yml up -d

name: covantic-dev

services:
  # PostgreSQL 18 — primary database
  postgres:
    image: postgres:18
    container_name: covantic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-covantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-covantic_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-covantic}
    ports:
      - "5499:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covantic"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 7 — cache, pub/sub, job queue
  redis:
    image: redis:7-alpine
    container_name: covantic-redis
    ports:
      - "6399:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (Fastify)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: covantic-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://covantic:covantic_dev_2026@postgres:5432/covantic
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: https://devnet.helius-rpc.com/?api-key=${HELIUS_API_KEY}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      HELIUS_WEBHOOK_SECRET: ${HELIUS_WEBHOOK_SECRET}
      PROGRAM_ID: ${PROGRAM_ID}
      ORACLE_KEYPAIR_PATH: /app/keys/oracle-keypair.json
      PORT: 4000
      LOG_LEVEL: debug
    ports:
      - "4099:4000"
    volumes:
      - ../packages/api/src:/app/packages/api/src
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: pnpm --filter api dev

  # Transaction Monitor (separate process)
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.monitor
    container_name: covantic-monitor
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://covantic:covantic_dev_2026@postgres:5432/covantic
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: https://devnet.helius-rpc.com/?api-key=${HELIUS_API_KEY}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      PROGRAM_ID: ${PROGRAM_ID}
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: pnpm --filter api run monitor

  # Frontend (Next.js)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: covantic-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4099
      NEXT_PUBLIC_WS_URL: ws://localhost:4099
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_PROGRAM_ID: ${PROGRAM_ID}
      NEXT_PUBLIC_SOLANA_NETWORK: devnet
    ports:
      - "3099:3000"
    volumes:
      - ../packages/web/src:/app/packages/web/src
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      - api
    restart: unless-stopped
    command: pnpm --filter web dev

volumes:
  pgdata:
  redisdata:
