# Production stack for Covantic — Hetzner VDS
# Usage: docker compose -f docker/docker-compose.prod.yml --env-file .env up -d

name: covantic

services:
  # PostgreSQL 18
  postgres:
    image: postgres:18
    container_name: covantic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-covantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-covantic}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covantic"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: covantic-redis
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 128mb
      --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Backend API (Fastify)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: covantic-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-covantic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-covantic}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ALERT_HMAC_SECRET: ${ALERT_HMAC_SECRET:?ALERT_HMAC_SECRET is required}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      HELIUS_WEBHOOK_SECRET: ${HELIUS_WEBHOOK_SECRET}
      PROGRAM_ID: ${PROGRAM_ID}
      ORACLE_KEYPAIR_PATH: /app/keys/oracle-keypair.json
      USDC_MINT: ${USDC_MINT}
      PORT: 4000
      LOG_LEVEL: info
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Transaction Monitor
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.monitor
    container_name: covantic-monitor
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-covantic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-covantic}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ALERT_HMAC_SECRET: ${ALERT_HMAC_SECRET:?ALERT_HMAC_SECRET is required}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      PROGRAM_ID: ${PROGRAM_ID}
      ORACLE_KEYPAIR_PATH: /app/keys/oracle-keypair.json
      USDC_MINT: ${USDC_MINT}
      LOG_LEVEL: info
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Frontend (Next.js)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL}
        NEXT_PUBLIC_PROGRAM_ID: ${PROGRAM_ID}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
    container_name: covantic-web
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - internal

  # Nginx reverse proxy + SSL
  nginx:
    image: nginx:alpine
    container_name: covantic-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - internal

  # Certbot for SSL renewal
  certbot:
    image: certbot/certbot
    container_name: covantic-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  internal:
    driver: bridge
